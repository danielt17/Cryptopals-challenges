<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">Project layout</title>
  <desc id="desc">Overview of the repository structure.</desc>
  <style>
    .box { fill: #f7f7f7; stroke: #222; stroke-width: 2; }
    .title { font: 700 18px Arial, sans-serif; fill: #111; }
    .label { font: 14px Arial, sans-serif; fill: #111; }
    .line { stroke: #222; stroke-width: 2; }
  </style>

  <rect class="box" x="330" y="20" width="240" height="60" rx="8" />
  <text class="title" x="450" y="55" text-anchor="middle">Cryptopals-challenges</text>

  <line class="line" x1="450" y1="80" x2="450" y2="115" />

  <rect class="box" x="70" y="120" width="190" height="60" rx="8" />
  <text class="label" x="165" y="155" text-anchor="middle">docs/</text>

  <rect class="box" x="275" y="120" width="190" height="60" rx="8" />
  <text class="label" x="370" y="155" text-anchor="middle">scripts/</text>

  <rect class="box" x="480" y="120" width="190" height="60" rx="8" />
  <text class="label" x="575" y="155" text-anchor="middle">src/sets/</text>

  <rect class="box" x="685" y="120" width="190" height="60" rx="8" />
  <text class="label" x="780" y="155" text-anchor="middle">assets/</text>

  <line class="line" x1="450" y1="115" x2="165" y2="115" />
  <line class="line" x1="165" y1="115" x2="165" y2="120" />
  <line class="line" x1="450" y1="115" x2="370" y2="115" />
  <line class="line" x1="370" y1="115" x2="370" y2="120" />
  <line class="line" x1="450" y1="115" x2="575" y2="115" />
  <line class="line" x1="575" y1="115" x2="575" y2="120" />
  <line class="line" x1="450" y1="115" x2="780" y2="115" />
  <line class="line" x1="780" y1="115" x2="780" y2="120" />

  <rect class="box" x="480" y="220" width="190" height="60" rx="8" />
  <text class="label" x="575" y="255" text-anchor="middle">set_XX_* / challenge_XX_*</text>

  <line class="line" x1="575" y1="180" x2="575" y2="220" />
</svg>
